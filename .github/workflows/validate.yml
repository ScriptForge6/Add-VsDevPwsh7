name: Validate Script
on: [push, pull_request]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 自动化测试用例执行
        shell: pwsh
        run: |
          $defaultVs = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          Write-Host "系统默认vswhere路径存在状态：$(Test-Path $defaultVs)"

          # ====================== 测试1：非法vswhere路径，预期 exit 1 ======================
          Write-Host "`n=== 测试1 非法vswhere，预期退出码 1 ==="
          .\Add-VsDevPwsh7.ps1 -Vswhere fake-123 -ErrorAction SilentlyContinue
          $exitCode1 = $LASTEXITCODE
          if ($exitCode1 -ne 1) {
              Write-Error "用例1校验失败：预期exit 1，实际返回 $exitCode1"
              exit 1
          }
          Write-Host "✅ 测试1 通过"

          # ====================== 测试2：输出目录无读写权限，预期 exit 2 ======================
          Write-Host "`n=== 测试2 输出目录无权限，预期退出码 2 ==="
          # 创建本地临时目录，不使用系统目录
          $noWriteDir = Join-Path $env:TEMP "no-write-test-dir"
          New-Item $noWriteDir -ItemType Directory -Force | Out-Null
          
          # 获取当前登录用户名
          $currentUser = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name
          Write-Host "当前执行用户：$currentUser"

          # 新建ACL规则：拒绝当前用户 写入/创建文件 权限
          $acl = Get-Acl $noWriteDir
          $denyRule = New-Object System.Security.AccessControl.FileSystemAccessRule(
              $currentUser,
              "CreateFiles,Write,WriteData",
              "ContainerInherit,ObjectInherit",
              "None",
              "Deny"
          )
          $acl.AddAccessRule($denyRule)
          Set-Acl -Path $noWriteDir -AclObject $acl
          
          # 执行用例2
          .\Add-VsDevPwsh7.ps1 -Vswhere $defaultVs -OutDir $readOnlyDir -ErrorAction SilentlyContinue
          $exitCode2 = $LASTEXITCODE
          if ($exitCode2 -ne 2) {
              Write-Error "用例2校验失败：预期exit 2，实际返回 $exitCode2"
              exit 1
          }
          Write-Host "✅ 测试2 通过"

          # ====================== 测试3：全部参数正常，预期 exit 0 ======================
          Write-Host "`n=== 测试3 参数全部合法，预期退出码 0 ==="
          $tmpTestDir = "$env:TEMP\vsdev-test-output"
          New-Item -Path $tmpTestDir -ItemType Directory -Force | Out-Null
          .\Add-VsDevPwsh7.ps1 -Vswhere $defaultVs -OutDir $tmpTestDir -ErrorAction SilentlyContinue
          $exitCode3 = $LASTEXITCODE
          if ($exitCode3 -ne 0)
          {
              Write-Error "用例3校验失败：预期exit 0，实际返回 $exitCode3"
              exit 1
          }
          Write-Host "✅ 测试3 通过"

          Write-Host "`n🎉 全部自动化测试用例执行通过"